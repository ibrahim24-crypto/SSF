name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.1
  
  # Google Sign-In
  google_sign_in: ^6.2.1
  
  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  
  # Routing
  go_router: ^14.2.0
  
  # UI
  cupertino_icons: ^1.0.8
  
  # Internationalization
  intl: ^0.19.0
  
  # Image & Cloudinary
  image_picker: ^1.1.2
  cloudinary_public: ^0.24.0
  
  # Utilities
  fast_levenshtein: ^3.0.0
  flutter_hooks: ^0.20.5

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.1
  
  # Linting
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
